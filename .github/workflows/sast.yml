name: SAST Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: ESLint Security
  # ──────────────────────────────────────────────
  eslint-security:
    name: ESLint Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint Security Audit
        id: eslint
        run: |
          pnpm eslint . \
            --max-warnings 0 \
            --format json \
            --output-file eslint-report.json || true

          ERRORS=$(cat eslint-report.json | jq '[.[] | .errorCount] | add // 0')
          WARNINGS=$(cat eslint-report.json | jq '[.[] | .warningCount] | add // 0')

          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"

          echo "### ESLint Security Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Errors: $ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Warnings: $WARNINGS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$ERRORS" -gt 0 ] || [ "$WARNINGS" -gt 0 ]; then
            echo "ESLint found $ERRORS errors and $WARNINGS warnings"
            cat eslint-report.json | jq -r '.[] | select(.errorCount > 0 or .warningCount > 0) | "\(.filePath):\n\(.messages[] | "  L\(.line): [\(.severity == 2 | if . then "ERROR" else "WARN" end)] \(.ruleId) - \(.message)")"'
            exit 1
          fi

      - name: Upload ESLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 2: Semgrep SAST
  # ──────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config .semgrep.yml \
            --severity WARNING \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Generate Summary
        if: always()
        run: |
          FINDINGS=$(python3 -c "
          import json
          data = json.load(open('semgrep-results.json'))
          results = data.get('results', [])
          print(len(results))
          ")

          echo "### Semgrep Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total findings: $FINDINGS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FINDINGS" -gt 0 ]; then
            python3 -c "
          import json
          data = json.load(open('semgrep-results.json'))
          for r in data.get('results', []):
              path = r.get('path', '?')
              line = r.get('start', {}).get('line', '?')
              rule = r.get('check_id', '?')
              sev = r.get('extra', {}).get('severity', '?')
              msg = r.get('extra', {}).get('message', '').split('\n')[0]
              print(f'{path}:{line} [{sev}] {rule} — {msg}')
          "
            exit 1
          fi

      - name: Upload Semgrep Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 3: Dependency Audit
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --json > audit-report.json 2>&1 || true

          echo "### Dependency Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pnpm audit 2>&1 | head -80 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          pnpm audit --audit-level=critical

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 4: Secret Detection
  # ──────────────────────────────────────────────
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=json
        continue-on-error: true

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Gitleaks Scan
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --report-format json \
            --report-path gitleaks-report.json
        continue-on-error: true

      - name: Generate Summary
        if: always()
        run: |
          echo "### Secret Detection Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- TruffleHog: ${{ steps.trufflehog.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gitleaks: ${{ steps.gitleaks.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [ -f gitleaks-report.json ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            echo "- Gitleaks findings: $LEAKS" >> "$GITHUB_STEP_SUMMARY"
            if [ "$LEAKS" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "#### Findings:" >> "$GITHUB_STEP_SUMMARY"
              jq -r '.[] | "- **\(.RuleID)** in `\(.File)` line \(.StartLine): \(.Description)"' gitleaks-report.json >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [ "${{ steps.trufflehog.outcome }}" = "failure" ] || [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "::error::Secrets detected in repository!"
            exit 1
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 5: License Compliance
  # ──────────────────────────────────────────────
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          npx license-checker \
            --json \
            --out license-report.json \
            --production

          FORBIDDEN=$(npx license-checker \
            --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later" \
            --production 2>&1) || true

          echo "### License Compliance Results" >> "$GITHUB_STEP_SUMMARY"

          if echo "$FORBIDDEN" | grep -q "Found forbidden"; then
            echo "::error::Forbidden licenses (GPL/AGPL) detected!"
            echo "$FORBIDDEN"
            echo "- Status: FAILED" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            TOTAL=$(cat license-report.json | jq 'keys | length')
            echo "- Status: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "- Packages scanned: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload License Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Summary PR Comment
  # ──────────────────────────────────────────────
  sast-summary:
    name: SAST Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - eslint-security
      - semgrep
      - dependency-audit
      - secret-detection
      - license-compliance
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';

            const results = {
              eslint: '${{ needs.eslint-security.result }}',
              semgrep: '${{ needs.semgrep.result }}',
              audit: '${{ needs.dependency-audit.result }}',
              secrets: '${{ needs.secret-detection.result }}',
              license: '${{ needs.license-compliance.result }}'
            };

            const allPassed = Object.values(results).every(r => r === 'success');

            const body = [
              '## 🛡️ SAST Pipeline Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| ESLint Security | ${icon(results.eslint)} ${results.eslint} |`,
              `| Semgrep SAST | ${icon(results.semgrep)} ${results.semgrep} |`,
              `| Dependency Audit | ${icon(results.audit)} ${results.audit} |`,
              `| Secret Detection | ${icon(results.secrets)} ${results.secrets} |`,
              `| License Compliance | ${icon(results.license)} ${results.license} |`,
              '',
              `**Overall: ${allPassed ? '✅ All checks passed' : '❌ Some checks failed'}**`,
              '',
              `> 📋 Details in [Actions](${context.payload.pull_request.html_url}/checks)`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('SAST Pipeline Results')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }